name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      # ── Determine signing capability ────────────────────────────────────────
      - name: Check signing capability
        id: caps
        env:
          HAS_CERT: ${{ secrets.DEVELOPER_ID_CERT_P12 }}
          HAS_NOTARY: ${{ secrets.APPLE_ID }}
        run: |
          [ -n "$HAS_CERT" ]   && echo "sign=true"   >> $GITHUB_OUTPUT || echo "sign=false"   >> $GITHUB_OUTPUT
          [ -n "$HAS_NOTARY" ] && echo "notary=true" >> $GITHUB_OUTPUT || echo "notary=false" >> $GITHUB_OUTPUT

      # ── Import Developer ID certificate into a temporary keychain ───────────
      - name: Import signing certificate
        if: steps.caps.outputs.sign == 'true'
        env:
          CERT_P12:         ${{ secrets.DEVELOPER_ID_CERT_P12 }}
          CERT_PASSWORD:    ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN=$RUNNER_TEMP/build.keychain
          echo "$CERT_P12" | base64 --decode -o $RUNNER_TEMP/cert.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN
          security set-keychain-settings -lut 21600 $KEYCHAIN
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN
          security import $RUNNER_TEMP/cert.p12 -P "$CERT_PASSWORD" \
            -A -t cert -f pkcs12 -k $KEYCHAIN
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN
          security list-keychains -d user -s $KEYCHAIN
          rm $RUNNER_TEMP/cert.p12

      # ── Lint ────────────────────────────────────────────────────────────────
      - name: Lint
        run: make lint

      # ── Build ───────────────────────────────────────────────────────────────
      - name: Build (signed)
        if: steps.caps.outputs.sign == 'true'
        env:
          SIGN_IDENTITY: ${{ secrets.DEVELOPER_ID_IDENTITY }}
        run: |
          make build SIGNING_FLAGS="CODE_SIGN_IDENTITY='$SIGN_IDENTITY' \
            ENABLE_HARDENED_RUNTIME=YES \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_ENTITLEMENTS=ClaudeTracker/ClaudeTracker.entitlements"

      - name: Build (unsigned)
        if: steps.caps.outputs.sign == 'false'
        run: make build SIGNING_FLAGS="CODE_SIGNING_ALLOWED=NO"

      # ── Codesign ────────────────────────────────────────────────────────────
      - name: Sign app
        if: steps.caps.outputs.sign == 'true'
        env:
          SIGN_IDENTITY: ${{ secrets.DEVELOPER_ID_IDENTITY }}
        run: make sign SIGN_IDENTITY="$SIGN_IDENTITY"

      # ── Notarize & staple ───────────────────────────────────────────────────
      - name: Notarize
        if: steps.caps.outputs.notary == 'true'
        env:
          APPLE_ID:       ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID:  ${{ secrets.APPLE_TEAM_ID }}
        run: make notarize APPLE_ID="$APPLE_ID" APPLE_PASSWORD="$APPLE_PASSWORD" APPLE_TEAM_ID="$APPLE_TEAM_ID"

      - name: Staple
        if: steps.caps.outputs.notary == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
        run: make staple APPLE_ID="$APPLE_ID"

      # ── Package ─────────────────────────────────────────────────────────────
      - name: Create DMG and ZIP
        run: make dmg zip

      # ── Publish ─────────────────────────────────────────────────────────────
      - name: Create GitHub Release
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            release/ClaudeTracker.dmg \
            release/ClaudeTracker.zip
        env:
          GH_TOKEN: ${{ github.token }}

      # ── Cleanup keychain ────────────────────────────────────────────────────
      - name: Remove temporary keychain
        if: always() && steps.caps.outputs.sign == 'true'
        run: security delete-keychain $RUNNER_TEMP/build.keychain || true
