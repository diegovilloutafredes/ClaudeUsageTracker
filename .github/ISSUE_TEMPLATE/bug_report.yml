name: Bug report
description: Something isn't working correctly
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as possible.

  - type: input
    id: macos-version
    attributes:
      label: macOS version
      placeholder: e.g. macOS 14.5 Sonoma
    validations:
      required: true

  - type: dropdown
    id: plan
    attributes:
      label: Claude plan
      options:
        - Pro
        - Max 5×
        - Max 20×
        - Team
        - Enterprise
        - Free / other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug clearly and concisely.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open the app
        2. Click …
        3. …
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Console output (if any)
      description: Open Console.app, filter by `ClaudeUsageTracker`, and paste relevant lines here.
      render: shell
